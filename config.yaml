# List every site you want to track here.
#
# type: css   -> extract listings using CSS selectors (fast, free, reliable
#                as long as the site's HTML structure doesn't change)
# type: llm   -> extract listings by asking an LLM to read the page
#                (works on messy/inconsistent layouts, needs ANTHROPIC_API_KEY
#                set as a repo secret)
#
# render: true -> add this if the site loads listings via JavaScript rather
#                  than having them in the raw page (uses a slower headless
#                  browser to load the page fully first)

sites:
  - name: "UAntwerpen - Academisch personeel"
    type: llm
    url: "https://www.uantwerpen.be/nl/jobs/vacatures/ap/"

  - name: "UCLL"
    type: llm
    url: "https://ucll.cvw.io/?lang=nl-BE"

  - name: "VITO"
    type: llm
    url: "https://vito.be/nl/jobs"
    render: true
    
  - name: "UHASSELT"
    type: llm
    urls: 
         - "https://www.uhasselt.be/nl/over-uhasselt/werken-bij-uhasselt/vacatures?p=1"
         - "https://www.uhasselt.be/nl/over-uhasselt/werken-bij-uhasselt/vacatures?p=2"
         - "https://www.uhasselt.be/nl/over-uhasselt/werken-bij-uhasselt/vacatures?p=3"
         
  - name: "UGent"
    type: llm
    urls: 
         - "https://jobs.ugent.be/go/Professoren/8808802/"
         - "https://jobs.ugent.be/go/Onderzoekers/8808702/"
         
  - name: "AP"
    type: llm
    url: 
         - "https://www.ap.be/vacatures"
         
  - name: "KDG"
    type: llm
    url: 
         - "https://www.kdg.be/werken-bij-kdg/vacatures-bij-kdg"
         
  - name: "VUB"
    type: llm
    urls: 
         - "https://jobs.vub.be/go/NL_ALL-JOBS/3776001/?q=&sortColumn=referencedate&sortDirection=desc"
         - "https://jobs.vub.be/go/NL_ALL-JOBS/3776001/25/?q=&sortColumn=referencedate&sortDirection=desc"     
