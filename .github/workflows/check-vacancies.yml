name: Check vacancies

on:
  schedule:
    - cron: "0 7 * * *"   # every day at 07:00 UTC — edit to your preferred time
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py

      - name: Commit updated data and dashboard
        run: |
          git config user.name "vacancy-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/seen.json docs/index.html
          git diff --staged --quiet || git commit -m "Update vacancy data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
